version: "3"

vars:
  BACKEND_DIR: backend/server
  TOOL_BIN: "{{.TASKFILE_DIR}}/.bin"
  GO_CACHE: "{{.TASKFILE_DIR}}/.cache/go-build"
  GOLANGCI_LINT_CACHE: "{{.TASKFILE_DIR}}/.cache/golangci-lint"

tasks:
  tools:install:
    desc: Install golangci-lint locally for repository checks and formatting
    dir: "{{.BACKEND_DIR}}"
    env:
      GOBIN: "{{.TOOL_BIN}}"
      GOCACHE: "{{.GO_CACHE}}"
      GOLANGCI_LINT_CACHE: "{{.GOLANGCI_LINT_CACHE}}"
    cmds:
      - mkdir -p "{{.TOOL_BIN}}"
      - mkdir -p "{{.GO_CACHE}}"
      - mkdir -p "{{.GOLANGCI_LINT_CACHE}}"
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3

  fmt:
    desc: Format Go code with gofumpt and goimports via golangci-lint
    dir: "{{.BACKEND_DIR}}"
    env:
      GOCACHE: "{{.GO_CACHE}}"
      GOLANGCI_LINT_CACHE: "{{.GOLANGCI_LINT_CACHE}}"
    cmds:
      - mkdir -p "{{.GOLANGCI_LINT_CACHE}}"
      - "{{.TOOL_BIN}}/golangci-lint fmt"

  lint:
    desc: Run the configured Go linters and formatting checks
    dir: "{{.BACKEND_DIR}}"
    env:
      GOCACHE: "{{.GO_CACHE}}"
      GOLANGCI_LINT_CACHE: "{{.GOLANGCI_LINT_CACHE}}"
    cmds:
      - mkdir -p "{{.GOLANGCI_LINT_CACHE}}"
      - "{{.TOOL_BIN}}/golangci-lint run"

  test:
    desc: Run backend Go tests
    dir: "{{.BACKEND_DIR}}"
    env:
      GOCACHE: "{{.GO_CACHE}}"
    cmds:
      - mkdir -p "{{.GO_CACHE}}"
      - go test ./...

  build:
    desc: Build the backend Go packages
    dir: "{{.BACKEND_DIR}}"
    env:
      GOCACHE: "{{.GO_CACHE}}"
    cmds:
      - mkdir -p "{{.GO_CACHE}}"
      - go build ./...

  ci:
    desc: Run the backend verification suite used in CI
    cmds:
      - task: lint
      - task: test
      - task: build
