version: "2"

run:
  relative-path-mode: gomod
  modules-download-mode: readonly
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - unused

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      module-path: esp32-server
    goimports:
      local-prefixes:
        - esp32-server
