name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/server/go.mod
          cache-dependency-path: backend/server/go.sum

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Install golangci-lint
        run: task tools:install

      - name: Run linters
        run: task lint

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/server/go.mod
          cache-dependency-path: backend/server/go.sum

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Run tests
        run: task test

      - name: Build backend
        run: task build

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run type check
        run: pnpm run build

  docker:
    name: Docker Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config

      - name: Build monolith image
        run: docker build -t plantbee-app-ci -f backend/server/Dockerfile .
