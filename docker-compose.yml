services:
  app:
    container_name: plantbee-app
    build:
      context: .
      dockerfile: backend/server/Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/server/.env
        required: false
    restart: always
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: plantbee-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-plantbee}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: always

  client:
    container_name: plantbee-client
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "${CLIENT_PORT:-5173}:5173"
    environment:
      - VITE_API_URL=http://app:8080
    restart: always
    depends_on:
      - app

volumes:
  postgres_data:
