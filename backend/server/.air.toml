root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server ./cmd/server"
entrypoint = ["./tmp/server"]
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["tmp", "vendor"]
exclude_regex = ["_test\\.go"]
exclude_unchanged = true
follow_symlink = true
poll = true
poll_interval = 500
stop_on_error = true
