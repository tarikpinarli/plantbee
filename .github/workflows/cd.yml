name: CD

on:
  push:
    branches:
      - production
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: Deploy registry stack (creates ECR)
        working-directory: infra
        run: npx cdk deploy Plantbee-Registry --require-approval never

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPO: plantbee-api
          SHA: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$REPO:$SHA" -t "$REGISTRY/$REPO:latest" -f backend/server/Dockerfile .
          docker push "$REGISTRY/$REPO:$SHA"
          docker push "$REGISTRY/$REPO:latest"

      - name: Deploy infrastructure stacks
        working-directory: infra
        run: npx cdk deploy Plantbee-Network Plantbee-Database Plantbee-Frontend Plantbee-Backend --require-approval never --concurrency 4

      - name: Read stack outputs
        id: outputs
        run: |
          BACKEND_OUTPUTS=$(aws cloudformation describe-stacks --stack-name Plantbee-Backend --query "Stacks[0].Outputs" --output json)
          FRONTEND_OUTPUTS=$(aws cloudformation describe-stacks --stack-name Plantbee-Frontend --query "Stacks[0].Outputs" --output json)
          echo "api_url=$(echo "$BACKEND_OUTPUTS" | jq -r '.[] | select(.OutputKey=="ApiUrl") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "cluster=$(echo "$BACKEND_OUTPUTS" | jq -r '.[] | select(.OutputKey=="EcsClusterName") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "service=$(echo "$BACKEND_OUTPUTS" | jq -r '.[] | select(.OutputKey=="EcsServiceName") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "spa_bucket=$(echo "$FRONTEND_OUTPUTS" | jq -r '.[] | select(.OutputKey=="SpaBucketName") | .OutputValue')" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(echo "$FRONTEND_OUTPUTS" | jq -r '.[] | select(.OutputKey=="CloudFrontDistributionId") | .OutputValue')" >> "$GITHUB_OUTPUT"

      - name: Force ECS service redeploy (pulls new image)
        run: |
          aws ecs update-service \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --service "${{ steps.outputs.outputs.service }}" \
            --force-new-deployment >/dev/null

      - name: Build SPA
        working-directory: client
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Sync SPA to S3
        run: aws s3 sync client/dist "s3://${{ steps.outputs.outputs.spa_bucket }}/" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution_id }}" \
            --paths "/*" >/dev/null

      - name: Wait for ECS service to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.outputs.outputs.cluster }}" \
            --services "${{ steps.outputs.outputs.service }}"
