services:
  app:
    container_name: plantbee-app
    build:
      context: .
      dockerfile: backend/server/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: ./backend/server/.env
        required: false
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: plantbee-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-plantbee}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    container_name: plantbee-adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db

  frontend:
    container_name: plantbee-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://app:8080
    depends_on:
      - app

volumes:
  postgres_data:
